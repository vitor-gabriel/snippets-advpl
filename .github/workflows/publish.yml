name: Publish VSCode Extension
on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Instalar vsce
        run: npm install -g @vscode/vsce

      - name: Bump de versão patch
        run: npm version patch --no-git-tag-version

      - name: Atualizar Changelog no README
        run: |
          VERSION=$(node -p "require('./package.json').version")
          DATE=$(date +'%d/%m/%Y')
          COMMITS=$(git log --pretty=format:"- %s" -5 --no-merges HEAD~5..HEAD 2>/dev/null || git log --pretty=format:"- %s" --no-merges)
          ENTRY="### v$VERSION — $DATE"$'\n'"$COMMITS"$'\n'
          awk -v entry="$ENTRY" '
            /<!-- CHANGELOG_START -->/ {
              print
              print entry
              next
            }
            { print }
          ' README.md > README.tmp && mv README.tmp README.md

      - name: Commitar versão atualizada
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json README.md
          git commit -m "chore: bump version [skip ci]"
          git push

      - name: Empacotar a extensão (.vsix)
        run: vsce package

      - name: Publicar no VS Marketplace
        run: vsce publish -p ${{ secrets.VSCE_PAT }}